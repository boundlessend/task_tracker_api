services:
  app:
    build:
      context: .
      target: runtime
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
  tests:
    build:
      context: .
      target: test
    profiles: ["test"]