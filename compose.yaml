services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: task_tracker
      POSTGRES_USER: task_tracker
      POSTGRES_PASSWORD: task_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_tracker -d task_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  migrate:
    build:
      context: .
      target: runtime
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: postgresql+psycopg://task_tracker:task_tracker@db:5432/task_tracker
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: postgresql+psycopg://task_tracker:task_tracker@db:5432/task_tracker
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  tests:
    build:
      context: .
      target: test
    profiles: ["test"]

volumes:
  postgres_data:
