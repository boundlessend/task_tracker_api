services:
  app:
    build:
      context: .
      target: runtime
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    environment:
      - APP_HOST=0.0.0.0
  tests:
    build:
      context: .
      target: test
    profiles: ["test"]